<!doctype html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Penca Mundial 2026 — Pronósticos</title>
<style>
:root{--bordo:#6b1220;--gold:#c9a24a;--bg:#faf7f2;--ink:#23201c;--mut:#8a8278}
*{box-sizing:border-box}body{margin:0;font:16px/1.5 -apple-system,system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
header{background:var(--bordo);color:#fff;padding:20px 16px}
header h1{margin:0;font-size:20px}header p{margin:6px 0 0;color:#f0d9b8;font-size:13px}
.prog{max-width:760px;margin:14px auto 0;padding:0 16px}
.bar{height:8px;background:#e7e0d5;border-radius:99px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--gold);width:0}
main{max-width:760px;margin:0 auto;padding:8px 16px 60px}
h2{font-size:14px;text-transform:uppercase;letter-spacing:.06em;color:var(--bordo);margin:22px 0 8px;border-bottom:1px solid #e7e0d5;padding-bottom:6px}
.m{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:10px}
.m:hover{background:#fff}
.m.risk{background:#fff7e6}
.m input{width:20px;height:20px;accent-color:var(--bordo);flex:none}
.tm{flex:1;min-width:0}
.tm .t{font-weight:600}.tm .s{color:var(--mut);font-size:12px}
.sc{font-weight:700;color:var(--bordo);font-size:18px;font-variant-numeric:tabular-nums;flex:none}
.m.risk .sc{color:#b9770a}
.cf{font-size:11px;color:var(--mut);flex:none;width:58px;text-align:right}
.done .tm,.done .sc{opacity:.4;text-decoration:line-through}
</style></head><body>
<header><h1>Penca Mundial 2026</h1><p>FECHA 3 — Cuenta A (segura, variada): marcador más probable del favorito.</p></header>
<div class="prog"><div class="bar"><i id="fill"></i></div><div style="font-size:12px;color:var(--mut);margin-top:6px"><span id="n">0</span> de <span id="tot">0</span> cargados</div></div>
<main>
<h2>24/06</h2>
<label class="m" data-i="0"><input type="checkbox"><span class="tm"><span class="t">Bosnia vs Qatar</span><span class="s">19:00 UTC · exacto ~10%</span></span><span class="sc">2-1</span><span class="cf">2.5 pts</span></label>
<label class="m" data-i="1"><input type="checkbox"><span class="tm"><span class="t">Suiza vs Canadá</span><span class="s">19:00 UTC · exacto ~10%</span></span><span class="sc">1-0</span><span class="cf">2.1 pts</span></label>
<label class="m" data-i="2"><input type="checkbox"><span class="tm"><span class="t">Escocia vs Brasil</span><span class="s">22:00 UTC · exacto ~10%</span></span><span class="sc">0-2</span><span class="cf">2.6 pts</span></label>
<label class="m" data-i="3"><input type="checkbox"><span class="tm"><span class="t">Marruecos vs Haití</span><span class="s">22:00 UTC · exacto ~10%</span></span><span class="sc">2-0</span><span class="cf">2.9 pts</span></label>

<label class="m" data-i="4"><input type="checkbox"><span class="tm"><span class="t">Rep. Checa vs México</span><span class="s">01:00 UTC · exacto ~10%</span></span><span class="sc">1-2</span><span class="cf">2.3 pts</span></label>
<label class="m" data-i="5"><input type="checkbox"><span class="tm"><span class="t">Sudáfrica vs Corea del Sur</span><span class="s">01:00 UTC · exacto ~10%</span></span><span class="sc">0-2</span><span class="cf">2.5 pts</span></label>
<label class="m" data-i="6"><input type="checkbox"><span class="tm"><span class="t">Curazao vs Costa de Marfil</span><span class="s">20:00 UTC · exacto ~11%</span></span><span class="sc">0-2</span><span class="cf">3.1 pts</span></label>
<label class="m" data-i="7"><input type="checkbox"><span class="tm"><span class="t">Ecuador vs Alemania</span><span class="s">20:00 UTC · exacto ~10%</span></span><span class="sc">1-2</span><span class="cf">2.3 pts</span></label>
<label class="m" data-i="8"><input type="checkbox"><span class="tm"><span class="t">Japón vs Suecia</span><span class="s">23:00 UTC · exacto ~9%</span></span><span class="sc">1-0</span><span class="cf">2.1 pts</span></label>
<label class="m" data-i="9"><input type="checkbox"><span class="tm"><span class="t">Túnez vs Países Bajos</span><span class="s">23:00 UTC · exacto ~10%</span></span><span class="sc">0-2</span><span class="cf">2.6 pts</span></label>
<h2>26/06</h2>
<label class="m" data-i="10"><input type="checkbox"><span class="tm"><span class="t">Paraguay vs Australia</span><span class="s">02:00 UTC · exacto ~9%</span></span><span class="sc">2-1</span><span class="cf">2.1 pts</span></label>

<label class="m" data-i="13"><input type="checkbox"><span class="tm"><span class="t">Senegal vs Irak</span><span class="s">19:00 UTC · exacto ~10%</span></span><span class="sc">2-0</span><span class="cf">2.7 pts</span></label>
<h2>27/06</h2>
<label class="m" data-i="14"><input type="checkbox"><span class="tm"><span class="t">Cabo Verde vs Arabia Saudita</span><span class="s">00:00 UTC · exacto ~12%</span></span><span class="sc">1-0</span><span class="cf">2.0 pts</span></label>

<label class="m" data-i="19"><input type="checkbox"><span class="tm"><span class="t">Panamá vs Inglaterra</span><span class="s">21:00 UTC · exacto ~10%</span></span><span class="sc">0-2</span><span class="cf">2.9 pts</span></label>
<label class="m" data-i="20"><input type="checkbox"><span class="tm"><span class="t">Colombia vs Portugal</span><span class="s">23:30 UTC · exacto ~9%</span></span><span class="sc">0-1</span><span class="cf">2.1 pts</span></label>
<label class="m" data-i="21"><input type="checkbox"><span class="tm"><span class="t">RD Congo vs Uzbekistán</span><span class="s">23:30 UTC · exacto ~10%</span></span><span class="sc">1-0</span><span class="cf">2.0 pts</span></label>
<h2>28/06</h2>
<label class="m" data-i="22"><input type="checkbox"><span class="tm"><span class="t">Argelia vs Austria</span><span class="s">02:00 UTC · exacto ~9%</span></span><span class="sc">0-1</span><span class="cf">2.1 pts</span></label>
<label class="m" data-i="23"><input type="checkbox"><span class="tm"><span class="t">Jordania vs Argentina</span><span class="s">02:00 UTC · exacto ~11%</span></span><span class="sc">0-2</span><span class="cf">3.2 pts</span></label>
</main>
<script>
const PREFIX='penca_f3_segura_';
const boxes=[...document.querySelectorAll('.m input')];
document.getElementById('tot').textContent=boxes.length;
function refresh(){let n=0;boxes.forEach((b,i)=>{const l=b.closest('.m');
 if(b.checked){n++;l.classList.add('done')}else{l.classList.remove('done')}});
 document.getElementById('n').textContent=n;
 document.getElementById('fill').style.width=(boxes.length? n/boxes.length*100:0)+'%'}
boxes.forEach((b,i)=>{b.checked=localStorage.getItem(PREFIX+i)==='1';
 b.addEventListener('change',()=>{localStorage.setItem(PREFIX+i,b.checked?'1':'0');refresh()})});
refresh();
</script></body></html>
